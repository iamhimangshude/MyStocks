<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyStocks - Stock Logging</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- SheetJS for Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <i class="ph-fill ph-chart-line-up"></i>
                <h2>MyStocks</h2>
            </div>
            
            <div class="profit-card">
                <h3>Total Profit / Loss</h3>
                <h1 id="total-profit">₹0.00</h1>
            </div>

            <nav class="actions-nav">
                <h3>Actions</h3>
                <button class="btn btn-outline" id="btn-export-excel"><i class="ph ph-microsoft-excel-logo"></i> Export Excel</button>
                <button class="btn btn-outline" id="btn-export-csv"><i class="ph ph-file-csv"></i> Export CSV</button>
                <button class="btn btn-outline" id="btn-export-json"><i class="ph ph-file-code"></i> Export JSON</button>
                
                <hr>
                
                <label for="import-file" class="btn btn-primary import-label">
                    <i class="ph ph-upload-simple"></i> Import Data
                </label>
                <input type="file" id="import-file" accept=".xlsx, .xls, .csv, .json" hidden>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar glass-panel">
                <div class="search-box">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Search by stock name or date (YYYY-MM-DD)...">
                </div>
                <div class="controls">
                    <div class="control-group">
                        <label><i class="ph ph-sort-ascending"></i> Sort By</label>
                        <select id="sort-select">
                            <option value="date-desc">Date (Newest)</option>
                            <option value="date-asc">Date (Oldest)</option>
                            <option value="name-asc">Name (A-Z)</option>
                            <option value="name-desc">Name (Z-A)</option>
                            <option value="profit-desc">Profit (High-Low)</option>
                            <option value="profit-asc">Profit (Low-High)</option>
                        </select>
                    </div>
                </div>
            </header>

            <div class="content-grid">
                <!-- Add Stock Form -->
                <section class="form-section glass-panel">
                    <div class="section-header">
                        <h2><i class="ph ph-plus-circle"></i> Add / Edit Stock</h2>
                    </div>
                    <form id="stock-form">
                        <input type="hidden" id="stock-id">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="stock-name">Stock Name</label>
                                <input type="text" id="stock-name" required placeholder="e.g. AAPL">
                            </div>
                            <div class="form-group">
                                <label for="stock-date">Date</label>
                                <input type="date" id="stock-date" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="stock-qty">Quantity</label>
                                <input type="number" id="stock-qty" required min="0.01" step="0.01" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label for="stock-buy">Buy Price (₹)</label>
                                <input type="number" id="stock-buy" required min="0" step="0.01" placeholder="0.00">
                            </div>
                            <div class="form-group">
                                <label for="stock-sell">Sell Price (₹)</label>
                                <input type="number" id="stock-sell" min="0" step="0.01" placeholder="0.00">
                            </div>
                        </div>
                        <div class="form-group full-width">
                            <label for="stock-notes">Notes</label>
                            <input type="text" id="stock-notes" placeholder="Optional notes...">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="btn-save-stock"><i class="ph ph-floppy-disk"></i> Save Stock</button>
                            <button type="button" class="btn btn-outline" id="btn-cancel-edit" style="display: none;"><i class="ph ph-x"></i> Cancel</button>
                        </div>
                    </form>
                </section>

                <!-- Stock List -->
                <section class="list-section glass-panel">
                    <div class="section-header">
                        <h2><i class="ph ph-list-dashes"></i> Your Portfolio</h2>
                    </div>
                    <div class="table-container">
                        <table id="stock-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Date</th>
                                    <th>Qty</th>
                                    <th>Buy (₹)</th>
                                    <th>Sell (₹)</th>
                                    <th>Profit (₹)</th>
                                    <th>Notes</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="stock-tbody">
                                <!-- Rows will be inserted here by JS -->
                            </tbody>
                        </table>
                        <div id="empty-state" class="empty-state">
                            <i class="ph ph-folder-open"></i>
                            <p>No stocks found. Add some to get started!</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
